# @package _global_

training_config: configs/so101/training/grip_the_cube_v1.json
description: Resume canonical SO101 grip-the-cube training from the retained best closed-loop checkpoint.
tags:
  - so101
  - smolvla
  - grip_the_cube_v1
  - resume_best_closed_loop
launcher:
  run_dir: _workspace/so101_training/runs/grip_the_cube_v1_base_v1
  host: 0.0.0.0
  tensorboard_port: 6006
  dashboard_port: 8767
  tensorboard_enabled: true
  tensorboard_tunnel_enabled: true
  dashboard_enabled: false
  gpu_monitor_enabled: false
  progress_monitor_enabled: false
  allow_incomplete_monitoring: false
  hf_dataset_cache_root: _workspace/hf_datasets
  skip_hf_dataset_download: true
  use_local_dataset_roots: false
  hf_local_files_only: true
  gpu_monitor_interval_s: 5.0
  progress_monitor_interval_s: 600
  progress_monitor_batch_size: 32
  progress_monitor_validation_max_batches: 64
  runtime_platform: macos
  training_device: mps
  closed_loop_every_epochs: 1
  closed_loop_episodes: 10
  closed_loop_steps: 120
  closed_loop_env_id: MuJoCoPickLift-v1
  closed_loop_mujoco_gl: glfw
  max_monitored_checkpoints: 20
  closed_loop_policy: periodic
  closed_loop_runner: picklift
  closed_loop_eval_skill_mode: grip_the_cube_v1
  closed_loop_task_prompt: grip the green cube and lift
  closed_loop_action_contract_mode: processor
  closed_loop_record_rollout_gif: false
  record_loop_artifacts: true
  render_loop_media: true
  loop_artifact_width: 256
  loop_artifact_height: 256
  loop_artifact_fps: 12
  loop_artifact_every_n_steps: 1
  qwen_model: qwen3-vl-8b-instruct-mlx
  qwen_base_url: null
  qwen_api_key: null
  qwen_object: null
  qwen_env_object_color: null
  closed_loop_subgoal_chain_mode: "off"
  closed_loop_subgoal_sequence: null
  closed_loop_fixed_subgoal_chunks: 1
  closed_loop_valid_mask_checkpoint: null
  closed_loop_valid_mask_threshold: 0.5
  closed_loop_valid_mask_consecutive: 2
  closed_loop_policy_n_action_steps: 15
  closed_loop_policy_num_steps: 10
  validation_interval_steps: null
  validation_interval_epochs: 1
  python: .venv/bin/python
training_args:
  - --config_path=_workspace/so101_training/runs/grip_the_cube_v1_base_v1/model/checkpoints/best_closed_loop/pretrained_model/train_config.json
  - --policy.path=lerobot/smolvla_base
  - --resume=true
  - --so101-resume-checkpoint-path=_workspace/so101_training/runs/grip_the_cube_v1_base_v1/model/checkpoints/best_closed_loop
  - --checkpoint-retention-policy=best_val_and_closed_loop
  - --steps=30096
